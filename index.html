<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Login - TikTok Style</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: black;
    color: white;
}

/* Center container */
.container {
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

/* Login box */
.login-box {
    width: 300px;
    text-align: center;
}

/* Logo */
.logo {
    font-size: 35px;
    font-weight: bold;
    margin-bottom: 30px;
}

/* Input */
input {
    width: 100%;
    padding: 12px;
    margin: 8px 0;
    border-radius: 5px;
    border: none;
    outline: none;
}

/* Button */
button {
    width: 100%;
    padding: 12px;
    background: #fe2c55;
    border: none;
    color: white;
    font-size: 16px;
    border-radius: 5px;
    margin-top: 10px;
    cursor: pointer;
}

/* Divider */
.divider {
    margin: 15px 0;
    color: gray;
}

/* Social buttons */
.social {
    border: 1px solid gray;
    padding: 10px;
    margin: 8px 0;
    border-radius: 5px;
    cursor: pointer;
}

/* Footer */
.footer {
    margin-top: 20px;
    font-size: 12px;
    color: gray;
}
</style>

</head>

<body>

<div class="container">
    <div class="login-box">

        <div class="logo">TikTok</div>

        <input type="text" placeholder="Username or Email">
        <input type="password" placeholder="Password">

        <button>Log in</button>

        <div class="divider">or</div>

        <div class="social">Continue with Google</div>
        <div class="social">Continue with Facebook</div>

        <div class="footer">
            Don't have an account? Sign up
        </div>

    </div>
</div>

</body>
</html>
